services:
  goylord-server:
    image: ${DOCKER_IMAGE:-ghcr.io/xv752/goylord:latest}
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=.docker-cache/buildx
      cache_to:
        - type=local,dest=.docker-cache/buildx,mode=max
    container_name: goylord-server
    ports:
      - "${PORT:-5173}:5173"
    environment:
      PORT: 5173
      HOST: 0.0.0.0
      # Optional: set an explicit initial admin account. If GOYLORD_PASS is empty,
      # the server generates one-time bootstrap secrets and stores them in /app/data/save.json.
      GOYLORD_USER: ${GOYLORD_USER:-admin}
      GOYLORD_PASS: ${GOYLORD_PASS:-}
      # Optional overrides. If empty, generated and persisted to /app/data/save.json.
      JWT_SECRET: ${JWT_SECRET:-}
      GOYLORD_AGENT_TOKEN: ${GOYLORD_AGENT_TOKEN:-}
      NODE_ENV: ${NODE_ENV:-production}
      GOYLORD_TLS_CERT: ${GOYLORD_TLS_CERT:-/app/certs/server.crt}
      GOYLORD_TLS_KEY: ${GOYLORD_TLS_KEY:-/app/certs/server.key}
      GOYLORD_TLS_CA: ${GOYLORD_TLS_CA:-}
      # Set true only behind a trusted reverse proxy that terminates TLS (for example Render).
      # Default false keeps current behavior: Goylord terminates TLS in-process.
      GOYLORD_TLS_OFFLOAD: ${GOYLORD_TLS_OFFLOAD:-false}
      # Trust X-Forwarded-For / X-Real-IP / CF-Connecting-IP from an upstream proxy when
      # resolving the agent's source IP shown in the dashboard, audit log, and IP bans.
      # Set true only when a trusted reverse proxy (nginx, Caddy, Cloudflare, etc.) sits
      # in front of Goylord — otherwise agents can spoof their IP. Auto-enabled when
      # GOYLORD_TLS_OFFLOAD=true.
      GOYLORD_TRUST_PROXY: ${GOYLORD_TRUST_PROXY:-false}
      # Cookie security mode: auto (default), true, or false.
      # auto: Secure cookie on HTTPS requests / X-Forwarded-Proto=https.
      GOYLORD_AUTH_COOKIE_SECURE: ${GOYLORD_AUTH_COOKIE_SECURE:-auto}
      # Optional certbot integration (used only when NODE_ENV=production)
      GOYLORD_TLS_CERTBOT_ENABLED: ${GOYLORD_TLS_CERTBOT_ENABLED:-false}
      GOYLORD_TLS_CERTBOT_LIVE_PATH: ${GOYLORD_TLS_CERTBOT_LIVE_PATH:-/etc/letsencrypt/live}
      GOYLORD_TLS_CERTBOT_DOMAIN: ${GOYLORD_TLS_CERTBOT_DOMAIN:-}
      GOYLORD_TLS_CERTBOT_CERT_FILE: ${GOYLORD_TLS_CERTBOT_CERT_FILE:-fullchain.pem}
      GOYLORD_TLS_CERTBOT_KEY_FILE: ${GOYLORD_TLS_CERTBOT_KEY_FILE:-privkey.pem}
      GOYLORD_TLS_CERTBOT_CA_FILE: ${GOYLORD_TLS_CERTBOT_CA_FILE:-chain.pem}
      GOYLORD_CLIENT_BUILD_CACHE_DIR: ${GOYLORD_CLIENT_BUILD_CACHE_DIR:-/app/client-build-cache}
      GOYLORD_FILE_UPLOAD_INTENT_TTL_MS: ${GOYLORD_FILE_UPLOAD_INTENT_TTL_MS:-1800000}
      GOYLORD_FILE_UPLOAD_PULL_TTL_MS: ${GOYLORD_FILE_UPLOAD_PULL_TTL_MS:-1800000}
      # WebRTC: Bun reaches MediaMTX via the docker service name on bridge net.
      GOYLORD_MEDIAMTX_URL: ${GOYLORD_MEDIAMTX_URL:-http://goylord-mediamtx:8889}
      GOYLORD_TURN_HOST: ${GOYLORD_TURN_HOST:-127.0.0.1}
      GOYLORD_TURN_PORT: ${GOYLORD_TURN_PORT:-3478}
      GOYLORD_TURN_REALM: ${GOYLORD_TURN_REALM:-goylord}
      GOYLORD_TURN_SECRET_FILE: /run/goylord-turn/secret
      GOYLORD_TURN_CREDENTIAL_TTL_SECONDS: ${GOYLORD_TURN_CREDENTIAL_TTL_SECONDS:-3600}
    depends_on:
      mediamtx:
        condition: service_started
      turn-secret-init:
        condition: service_completed_successfully
    volumes:
      - goylord-data:/app/data
      - goylord-certs:/app/certs
      - goylord-client-build-cache:/app/client-build-cache
      - goylord-plugins:/app/plugins
      - goylord-turn-secret:/run/goylord-turn:ro
      # Uncomment to mount host certbot certs read-only
      # - /etc/letsencrypt:/etc/letsencrypt:ro
      # Uncomment to use a static config file instead of env vars
      # - ./Goylord-Server/config.json:/app/config.json:ro
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Use http:// when GOYLORD_TLS_OFFLOAD=true.
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate ${GOYLORD_HEALTHCHECK_URL:-https://localhost:5173/health} >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  turn-secret-init:
    image: alpine:3.22
    command: ["/bin/sh", "-ec", "umask 077; if [ ! -s /run/goylord-turn/secret ]; then head -c 32 /dev/urandom | base64 > /run/goylord-turn/secret; fi; IFS= read -r turn_secret < /run/goylord-turn/secret; printf 'webrtcICEServers2:\n  - url: \"stun:%s:%s\"\n  - url: \"turn:%s:%s?transport=udp\"\n    username: AUTH_SECRET\n    password: \"%s\"\n    clientOnly: true\n  - url: \"turn:%s:%s?transport=tcp\"\n    username: AUTH_SECRET\n    password: \"%s\"\n    clientOnly: true\n' \"$${GOYLORD_TURN_HOST}\" \"$${GOYLORD_TURN_PORT}\" \"$${GOYLORD_TURN_HOST}\" \"$${GOYLORD_TURN_PORT}\" \"$$turn_secret\" \"$${GOYLORD_TURN_HOST}\" \"$${GOYLORD_TURN_PORT}\" \"$$turn_secret\" > /run/goylord-turn/mediamtx.yml; chmod 0444 /run/goylord-turn/secret /run/goylord-turn/mediamtx.yml"]
    environment:
      GOYLORD_TURN_HOST: ${GOYLORD_TURN_HOST:-127.0.0.1}
      GOYLORD_TURN_PORT: ${GOYLORD_TURN_PORT:-3478}
    volumes:
      - goylord-turn-secret:/run/goylord-turn
    restart: "no"

  coturn:
    image: coturn/coturn:4.14.0-r0-alpine
    container_name: goylord-coturn
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        secret="$$(cat /run/goylord-turn/secret)"
        external=""
        if [ -n "$${GOYLORD_TURN_EXTERNAL_IP:-}" ]; then external="--external-ip=$${GOYLORD_TURN_EXTERNAL_IP}"; fi
        exec turnserver --fingerprint --use-auth-secret --static-auth-secret="$$secret" --realm="$${GOYLORD_TURN_REALM:-goylord}" --listening-port=3478 --min-port=49160 --max-port=49200 --no-tls --no-dtls --no-multicast-peers --log-file=stdout $$external
    environment:
      GOYLORD_TURN_REALM: ${GOYLORD_TURN_REALM:-goylord}
      GOYLORD_TURN_EXTERNAL_IP: ${GOYLORD_TURN_EXTERNAL_IP:-127.0.0.1}
    volumes:
      - goylord-turn-secret:/run/goylord-turn:ro
    depends_on:
      turn-secret-init:
        condition: service_completed_successfully
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: goylord-mediamtx
    restart: unless-stopped
    ports:
      # WHIP/WHEP signaling only reached by the Bun container internally,
      # so we don't publish 8889. ICE UDP/TCP must be reachable from the
      # outside world (browser + agent), so publish 8189.
      - "8189:8189/udp"
      - "8189:8189/tcp"
    environment:
      # Disable every protocol except WebRTC. The Goylord server proxies all
      # WHIP/WHEP signaling and enforces auth itself.
      MTX_RTSP: "no"
      MTX_RTMP: "no"
      MTX_HLS: "no"
      MTX_SRT: "no"
      # Fixed ICE ports (matched by the port-publish above).
      MTX_WEBRTCLOCALUDPADDRESS: ":8189"
      MTX_WEBRTCLOCALTCPADDRESS: ":8189"
      # Advertise 127.0.0.1 as an ICE candidate so browsers on the docker
      # host can reach MediaMTX through the published port. For viewers on
      # a different machine, override with the host's LAN/public IP, e.g.:
      #   GOYLORD_WEBRTC_ADDITIONAL_HOSTS=127.0.0.1,192.168.1.42
      MTX_WEBRTCADDITIONALHOSTS: ${GOYLORD_WEBRTC_ADDITIONAL_HOSTS:-127.0.0.1}
    volumes:
      - goylord-turn-secret:/run/goylord-turn:ro
    depends_on:
      turn-secret-init:
        condition: service_completed_successfully

volumes:
  goylord-data:
  goylord-certs:
  goylord-client-build-cache:
  goylord-plugins:
  goylord-turn-secret:
