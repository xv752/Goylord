<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/assets/nav-prelude.js"></script>
    <link rel="modulepreload" href="/assets/nav.js" />
    <title>Process Manager - Goylord</title>
    <link rel="stylesheet" href="/vendor/inter/400.css" />
    <link rel="stylesheet" href="/vendor/inter/600.css" />
    <link rel="stylesheet" href="/vendor/inter/700.css" />
    <link rel="stylesheet" href="/assets/tailwind.css" />
    <link rel="stylesheet" href="/assets/main.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/assets/custom.css" />
    <script defer src="/vendor/msgpackr/msgpackr.js"></script>
    <style>
      .process-row:hover {
        background-color: rgba(30, 41, 59, 0.62);
      }
      .process-row.selected {
        background-color: rgba(14, 165, 233, 0.12);
        box-shadow: inset 3px 0 0 rgb(56 189 248);
      }
      .process-row.self-process {
        background-color: rgba(234, 179, 8, 0.12);
        border-color: rgba(234, 179, 8, 0.5);
        box-shadow: inset 3px 0 0 0 #facc15;
      }
      .process-row.self-process.selected {
        background-color: rgba(234, 179, 8, 0.28);
      }
      /* Dark scrollbar styling */
      #process-list::-webkit-scrollbar {
        width: 8px;
      }
      #process-list::-webkit-scrollbar-track {
        background: #1e293b;
        border-radius: 999px;
      }
      #process-list::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 999px;
        border: 2px solid #1e293b;
      }
      #process-list::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      .tree-indent-guide {
        display: inline-block;
        position: relative;
        width: 16px;
        align-self: stretch;
        flex-shrink: 0;
      }
      .tree-indent-guide::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(100, 116, 139, 0.25);
      }
      .tree-indent {
        display: inline-block;
        width: 16px;
        flex-shrink: 0;
      }
      .tree-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        margin-right: 4px;
        color: #64748b;
        cursor: pointer;
        user-select: none;
        border-radius: 3px;
        transition:
          color 120ms ease,
          background-color 120ms ease,
          transform 150ms ease;
        flex-shrink: 0;
      }
      .tree-icon:hover {
        color: #93c5fd;
        background-color: rgba(96, 165, 250, 0.12);
      }
      .tree-icon.collapsed {
        transform: rotate(-90deg);
      }
      .process-row.collapsed > .children {
        display: none;
      }

      @media (max-width: 768px) {
        .process-header {
          display: none !important;
        }
        #process-list {
          max-height: none !important;
        }
        #process-list .process-row {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 0.75rem 1rem;
          padding: 0.75rem !important;
          font-size: 0.875rem;
        }
        #process-list .process-name {
          grid-column: 1 / -1;
          order: -1;
          min-width: 0;
        }
        #process-list .process-cell:not(.process-name)::before {
          content: attr(data-label);
          display: block;
          margin-bottom: 0.125rem;
          color: rgb(100 116 139);
          font-size: 0.625rem;
          font-weight: 600;
          letter-spacing: 0.05em;
          text-transform: uppercase;
        }
        .process-row .tree-indent {
          width: 10px;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header id="top-nav"></header>

    <main class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="mb-6 flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3">
        <div>
          <h1 class="text-2xl font-bold text-slate-100">Process Manager</h1>
          <p id="client-id-header" class="text-slate-400 text-sm mt-1 font-mono">Loading client...</p>
        </div>
        <span id="status-indicator" class="inline-flex self-start sm:self-auto items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 text-slate-300 border border-slate-700 text-xs font-medium">
          <i class="fa-solid fa-circle-notch fa-spin"></i> Connecting...
        </span>
      </div>

      <section class="bg-slate-900/60 border border-slate-800 rounded-xl overflow-hidden">
        <div class="p-4 sm:p-5 border-b border-slate-800 space-y-4">
          <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
            <div class="flex items-center gap-3">
              <div class="flex items-center justify-center w-9 h-9 rounded-lg bg-sky-500/10 border border-sky-500/30">
                <i class="fa-solid fa-list-check text-sky-400"></i>
              </div>
              <div>
                <h2 class="text-base font-semibold">Running processes</h2>
                <p id="process-count" class="text-xs text-slate-400"><i class="fa-solid fa-list mr-1"></i>0 processes</p>
              </div>
            </div>
            <div class="flex gap-2">
              <button id="refresh-btn" class="flex-1 lg:flex-none inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-sm font-medium disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                <i class="fa-solid fa-rotate"></i> Refresh
              </button>
              <button id="kill-btn" class="flex-1 lg:flex-none inline-flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-red-600/90 hover:bg-red-500 border border-red-500 text-white text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                <i class="fa-solid fa-skull-crossbones"></i> Kill selected
              </button>
            </div>
          </div>

          <div class="flex flex-col xl:flex-row xl:items-center gap-3">
            <div class="relative flex-1 min-w-0">
              <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
              <input id="search-input" type="search" placeholder="Search by process name, PID, or user..."
                class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-700 bg-slate-950/70 text-slate-100 placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/60 focus:border-sky-500" />
            </div>
            <div class="color-legend flex items-center gap-x-3 gap-y-2 flex-wrap text-xs text-slate-400">
              <span class="text-slate-500 font-semibold">Types</span>
              <span class="inline-flex items-center gap-1.5"><i class="fa-solid fa-circle text-[7px] text-purple-400"></i>System</span>
              <span class="inline-flex items-center gap-1.5"><i class="fa-solid fa-circle text-[7px] text-cyan-400"></i>Service</span>
              <span class="inline-flex items-center gap-1.5"><i class="fa-solid fa-circle text-[7px] text-green-300"></i>Own</span>
              <span class="inline-flex items-center gap-1.5"><i class="fa-solid fa-circle text-[7px] text-slate-200"></i>Other</span>
              <span class="inline-flex items-center gap-1.5"><i class="fa-solid fa-crosshairs text-yellow-400"></i>Agent</span>
            </div>
          </div>
        </div>

        <div class="overflow-hidden">
          <div
            class="process-header grid grid-cols-12 gap-3 px-4 py-3 bg-slate-950/60 border-b border-slate-800 text-[11px] font-semibold uppercase tracking-wider text-slate-500"
          >
            <div
              class="col-span-1 cursor-pointer hover:text-slate-200"
              id="sort-pid"
            >
              PID <i class="fa-solid fa-sort"></i>
            </div>
            <div
              class="col-span-4 cursor-pointer hover:text-slate-200"
              id="sort-name"
            >
              Name <i class="fa-solid fa-sort"></i>
            </div>
            <div
              class="col-span-2 cursor-pointer hover:text-slate-200"
              id="sort-cpu"
            >
              CPU % <i class="fa-solid fa-sort"></i>
            </div>
            <div
              class="col-span-2 cursor-pointer hover:text-slate-200"
              id="sort-memory"
            >
              Memory <i class="fa-solid fa-sort"></i>
            </div>
            <div class="col-span-3">User</div>
          </div>
          <div
            id="process-list"
            class="divide-y divide-slate-800/80 min-h-80 max-h-[calc(100vh-22rem)] overflow-y-auto"
          >
            <!-- Processes will be inserted here -->
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/nav.js"></script>
    <script type="module" src="/assets/processes.js"></script>
  </body>
</html>
