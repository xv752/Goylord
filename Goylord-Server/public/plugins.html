<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/assets/nav-prelude.js"></script>
    <link rel="modulepreload" href="/assets/nav.js" />
    <title>Goylord Plugins</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/vendor/inter/400.css" />
    <link rel="stylesheet" href="/vendor/inter/600.css" />
    <link rel="stylesheet" href="/vendor/inter/700.css" />
<link rel="stylesheet" href="/assets/tailwind.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/main.css" />
    <link rel="stylesheet" href="/assets/custom.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header id="top-nav"></header>
    <main class="px-5 py-6">
      <div class="max-w-5xl mx-auto flex flex-col gap-5">
        <div>
          <h1 class="text-2xl font-semibold">Plugins</h1>
          <p class="text-slate-400">Upload zip bundles and manage client plugins or server extensions</p>
        </div>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/50 p-5">
          <div class="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h2 class="text-lg font-semibold">Upload</h2>
              <p class="text-slate-400 text-sm">Drag a plugin zip here or click to browse</p>
            </div>
            <label
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800/70 border border-slate-700 hover:bg-slate-700 cursor-pointer"
            >
              <i class="fa-solid fa-upload"></i>
              <span>Choose zip</span>
              <input id="file-input" type="file" accept=".zip" class="hidden" />
            </label>
          </div>
          <div
            id="dropzone"
            class="mt-4 border-2 border-dashed border-slate-700 rounded-xl p-8 text-center text-slate-400"
          >
            Drop plugin zip here
          </div>
          <div id="upload-status" class="mt-3 text-sm text-slate-400"></div>
        </section>

        <section class="rounded-2xl border border-slate-800 bg-slate-900/50 p-5">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold">Installed plugins</h2>
            <button
              id="refresh-btn"
              class="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-slate-800/70 border border-slate-700 hover:bg-slate-700"
            >
              <i class="fa-solid fa-rotate"></i> Refresh
            </button>
          </div>
          <div id="plugin-list" class="mt-4 grid gap-3" role="list" aria-label="Installed plugins"></div>
        </section>

        <section id="trusted-keys-section" class="hidden rounded-2xl border border-slate-800 bg-slate-900/50 p-5">
          <h2 class="text-lg font-semibold"><i class="fa-solid fa-key mr-2"></i>Trusted Signing Keys</h2>
          <p class="text-slate-400 text-sm mt-1">Plugins signed by a trusted key can be loaded without confirmation. Add key fingerprints (SHA-256 hex) here.</p>
          <div id="trusted-keys-list" class="mt-4 grid gap-2"></div>
          <div class="mt-4 flex gap-2">
            <input
              id="new-trusted-key-input"
              type="text"
              placeholder="Paste 64-char hex fingerprint…"
              class="flex-1 px-3 py-2 rounded-lg bg-slate-950 border border-slate-700 text-slate-100 font-mono text-sm placeholder-slate-500 focus:outline-none focus:border-emerald-600"
              maxlength="64"
            />
            <button
              id="add-trusted-key-btn"
              class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-emerald-900/40 border border-emerald-700/60 hover:bg-emerald-800/60 text-emerald-100"
            >
              <i class="fa-solid fa-plus"></i> Add Key
            </button>
          </div>
        </section>
      </div>
    </main>
    <script type="module" src="/assets/nav.js"></script>
    <script type="module" src="/assets/plugins.js"></script>
  </body>
</html>
