<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Goylord</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/vendor/inter/400.css" />
    <link rel="stylesheet" href="/vendor/inter/600.css" />
    <link rel="stylesheet" href="/vendor/inter/700.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/main.css" />
    <link rel="stylesheet" href="/assets/custom.css" />
    <script src="/vendor/animejs/anime.min.js"></script>
  </head>
  <body class="login-body">
    <div class="login-particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="login-card">
      <div class="login-crown-wrapper">
        <i class="fa-solid fa-shield-halved login-crown"></i>
      </div>
      <div class="brand login-brand">Secure your account</div>
      <h2 class="login-title">Set a new password</h2>
      <p class="muted login-subtitle">
        Choose a fresh password to replace the default before you continue.
      </p>
      <form id="change-password-form">
        <div class="form-group">
          <label class="label">Current password</label>
          <div class="input-row input-animated">
            <i class="fa-solid fa-lock"></i
            ><input
              id="current-pass"
              name="current-pass"
              type="password"
              autocomplete="current-password"
              required
              placeholder="Enter current password"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="label">New password</label>
          <div class="input-row input-animated">
            <i class="fa-solid fa-key"></i
            ><input
              id="new-pass"
              name="new-pass"
              type="password"
              autocomplete="new-password"
              required
              minlength="6"
              placeholder="At least 6 characters"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="label">Confirm new password</label>
          <div class="input-row input-animated">
            <i class="fa-solid fa-key"></i
            ><input
              id="confirm-pass"
              name="confirm-pass"
              type="password"
              autocomplete="new-password"
              required
              placeholder="Re-enter new password"
            />
          </div>
        </div>

        <button type="submit" class="button primary full login-btn">
          <span class="btn-text">Update password</span>
          <i class="fa-solid fa-arrow-right btn-icon"></i>
        </button>
        <div id="error" class="error" aria-live="polite"></div>
        <div id="success" class="success" aria-live="polite"></div>
      </form>
    </div>
    <script type="module" src="/assets/change-password.js"></script>
  </body>
</html>
