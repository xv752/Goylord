name: goylord-ci

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to publish, for example 1.2.3'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Resolve version
        id: set
        run: |
          v="${{ inputs.release_version || github.ref_name }}"
          v="${v#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

  approve-release:
    needs: resolve-version
    runs-on: ubuntu-latest
    environment: goylord-ci
    steps:
      - name: Confirm release approval
        run: echo "Approved release ${{ needs.resolve-version.outputs.version }}"

  build-backstage-dll:
    needs: [resolve-version, approve-release]
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Validate Release Version
        shell: pwsh
        run: |
          if ("${{ needs.resolve-version.outputs.version }}" -notmatch '^\d+\.\d+\.\d+$') {
            throw "Release version must be strict semver like 1.2.3; got '${{ needs.resolve-version.outputs.version }}'"
          }

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build BackstageInjection DLL with MSVC
        shell: cmd
        run: call scripts\build-backstage-dll.bat

      - name: Build BackstageCapture DLL with MSVC
        shell: cmd
        run: call scripts\build-backstage-capture-dll.bat

      - name: Upload backstage DLLs
        uses: actions/upload-artifact@v4
        with:
          name: backstage-dll
          path: |
            Goylord-Server/dist-clients/BackstageInjection.x64.dll
            Goylord-Server/dist-clients/BackstageCapture.x64.dll
          if-no-files-found: error
          retention-days: 1

  build-and-push:
    needs: [resolve-version, build-backstage-dll]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download backstage DLLs
        uses: actions/download-artifact@v4
        with:
          name: backstage-dll
          path: Goylord-Server/dist-clients

      - name: Read Source Version
        id: srcver
        shell: bash
        run: |
          set -euo pipefail

          client_version=$(grep -oP 'var\s+AgentVersion\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' Goylord-Client/cmd/agent/config/config.go)
          server_version=$(grep -oP 'export\s+const\s+SERVER_VERSION\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' Goylord-Server/src/version.ts)
          package_version=$(node -p "require('./Goylord-Server/package.json').version")

          if [[ -z "$client_version" || -z "$server_version" || -z "$package_version" ]]; then
            echo "Failed to parse one or more version values from source files" >&2
            exit 1
          fi

          if [[ "$client_version" != "$server_version" || "$client_version" != "$package_version" ]]; then
            echo "Version mismatch detected:" >&2
            echo "  client(config.go): $client_version" >&2
            echo "  server(version.ts): $server_version" >&2
            echo "  package(package.json): $package_version" >&2
            exit 1
          fi

          major="${client_version%%.*}"
          rest="${client_version#*.}"
          minor="${rest%%.*}"

          echo "version=$client_version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"

      - name: Validate Release Version Matches Source Version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be strict semver like 1.2.3; got ${RELEASE_VERSION}" >&2
            exit 1
          fi
          src_version="${{ steps.srcver.outputs.version }}"
          if [[ "$RELEASE_VERSION" != "$src_version" ]]; then
            echo "Release version ($RELEASE_VERSION) does not match source version ($src_version)" >&2
            exit 1
          fi

      - name: Normalize image name
        run: printf 'IMAGE_NAME=%s\n' "${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.srcver.outputs.version }}
            type=raw,value=${{ steps.srcver.outputs.major }}.${{ steps.srcver.outputs.minor }}
            type=raw,value=${{ steps.srcver.outputs.major }}
            type=raw,value=latest

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
