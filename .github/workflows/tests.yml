name: tests

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'Goylord-Server/**'
            client:
              - 'Goylord-Client/**'
              - 'go.work'
              - 'go.work.sum'

  server-tests:
    needs: changes
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Goylord-Server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install server dependencies
        run: bun install --frozen-lockfile

      - name: Run server tests
        shell: bash
        run: |
          test_files=$(find src -name '*.test.ts' ! -name 'client-order.test.ts')
          bun test $test_files

  client-tests:
    needs: changes
    if: needs.changes.outputs.client == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: Goylord-Client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: Goylord-Client/go.mod
          cache: true
          cache-dependency-path: |
            Goylord-Client/go.sum
            go.work.sum

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxfixes-dev libxi-dev libxtst-dev libxrandr-dev libxinerama-dev libxcursor-dev libwayland-dev libxkbcommon-dev

      - name: Download Go modules
        run: go mod download

      - name: Vendor third-party headers (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          bash scripts/vendor-onevpl-headers.sh
          bash scripts/vendor-amf-headers.sh

      - name: Run client tests
        env:
          GOWORK: "off"
        run: go test ./...
