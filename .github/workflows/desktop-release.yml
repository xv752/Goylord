name: Goylord Desktop Windows Release

on:
  push:
    branches: ["main"]
    paths:
      - "Goylord-Desktop/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: Goylord-Desktop

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "package.json version must be strict X.Y.Z SemVer for release tags; got '$version'"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Ensure Release Tag Does Not Exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tag="Goylord-Desktop-v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Release tag already exists: ${tag}" >&2
            exit 1
          fi
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release already exists: ${tag}" >&2
            exit 1
          fi
        shell: bash

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Goylord-Desktop/src-tauri -> target

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Vendor frontend assets
        run: bun run vendor

      - name: Build Windows Installer (Tauri NSIS)
        run: bun run build:win

      - name: Locate NSIS Installer
        id: locate
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Path src-tauri\target\release\bundle\nsis\*.exe -ErrorAction Stop | Select-Object -First 1
          echo "INSTALLER=$($nsis.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($nsis.Name)" >> $env:GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: goylord-desktop-${{ steps.version.outputs.version }}
          path: ${{ env.INSTALLER }}

      - name: Create and Push Tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tag="Goylord-Desktop-v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "${tag}"
        shell: bash

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tag="Goylord-Desktop-v${VERSION}"
          gh release create "${tag}" "${INSTALLER}" "PLEASE_READ.txt" \
            --verify-tag \
            -t "Goylord Desktop v${VERSION}" \
            -n "Automated build release for Goylord Desktop v${VERSION}" \
            --draft=false \
            --prerelease=false
        shell: bash
